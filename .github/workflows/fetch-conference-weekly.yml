name: Fetch conference award papers (weekly)

on:
  schedule:
    # Every Monday 04:00 UTC = 13:00 JST
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch conference award papers
        run: python scripts/fetch_conference_awards.py

      - name: Regenerate RSS feed
        run: python scripts/generate_rss.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: weekly conference award fetch"
          file_pattern: "data/*.json public/rss.xml"

      - name: Notify about new papers
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_SITE_URL: ${{ vars.SITE_URL }}
        run: python scripts/notify_new_papers.py
