name: Apply memo update from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: contains(github.event.issue.labels.*.name, 'memo-update')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply memo to data/papers.json
        id: apply
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/apply_memo_from_issue.py

      - name: Commit and push changes
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update memo via issue #${{ github.event.issue.number }}"
          file_pattern: "data/papers.json"

      - name: Close issue with success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "メモを反映しました。サイトへの反映には、次回のPagesデプロイ完了までお待ちください。",
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "メモの反映に失敗しました。論文IDが `data/papers.json` の既存エントリと一致しているか確認してください。修正して編集すると再実行はされないので、内容を直して新しくIssueを作成してください。",
            });
